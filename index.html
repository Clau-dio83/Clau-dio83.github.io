<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claudio's Terminal</title>
    <style>
        /* Base page styling */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #050505; /* Very dark grey, almost black */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The container holding the monitor image */
        .monitor-wrapper {
            position: relative;
            /* Force the width to be large, but not wider than the screen */
            width: 95vw; 
            /* Let the height be determined by the image's aspect ratio */
            height: auto; 
            /* Ensure it doesn't get ridiculously huge on very large screens */
            max-width: 1600px; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The monitor image itself */
        .monitor-img {
            width: 100%;
            height: auto;
            display: block; /* Removes tiny space below inline images */
            z-index: 1;
        }

        /* The interactive area mapped to the screen */
        .screen-glass-area {
            position: absolute;
            z-index: 10;
            
            /* Coordinates relative to the monitor image container */
            top: 10%;      
            left: 7%;      
            width: 61.5%;  
            height: 77%;   
            
            border-radius: 5%; 
            overflow: hidden; 
            background-color: rgba(5, 10, 5, 0.4); 
        }

        /* The actual container where text is printed */
        .terminal-content {
            padding: 2.5vw; /* Responsive padding */
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            overflow-y: auto;
            color: #33ff00;
            font-family: 'Courier New', Courier, monospace;
            /* Increased responsive font size, with a fallback minimum */
            font-size: max(16px, 1.6vw); 
            line-height: 1.3;
            text-shadow: 0 0 3px #33ff00, 0 0 8px #1a8000;
        }

        /* Hide scrollbars */
        .terminal-content::-webkit-scrollbar { display: none; }
        .terminal-content { -ms-overflow-style: none; scrollbar-width: none; }

        /* The Matrix Canvas */
        #matrix-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; 
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* CRT Scanlines overlaid on the text */
        .crt-scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 20;
        }
        
        /* CRT Curvature Shadow */
        .crt-vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.5) 100%);
            pointer-events: none;
            z-index: 21;
        }

        pre { 
            margin: 0 0 1vw 0; 
            font-family: inherit; 
            white-space: pre-wrap; 
            word-wrap: break-word;
        }
        
        p { 
            margin: 0.5vw 0; 
            min-height: 1.2em; 
            word-break: break-all; 
            overflow-wrap: break-word;
        }
        
        .input-line { 
            display: none; 
            align-items: center; 
            margin-top: 1vw; 
            width: 100%;
        }

        input[type="text"] {
            background: transparent;
            border: none;
            color: #33ff00;
            font-family: 'Courier New', Courier, monospace;
            font-size: inherit;
            outline: none;
            width: 100%;
            margin-left: 0.5vw;
            text-shadow: 0 0 3px #33ff00;
            caret-color: #33ff00;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="monitor-wrapper">
        <img src="monitor3-6.webp" alt="Retro Monitor" class="monitor-img" id="monitor-img">
        
        <div class="screen-glass-area" id="screen-glass">
            <canvas id="matrix-canvas"></canvas>
            <div class="crt-scanlines"></div>
            <div class="crt-vignette"></div>

            <div class="terminal-content" id="terminal-content">
                <pre id="ascii-header"></pre>
                <div id="history"></div>
                <div class="input-line" id="input-container">
                    <span>></span>
                    <input type="text" id="command-input" autocomplete="off" spellcheck="false">
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- JS LOGIC REMAINS IDENTICAL ---

        const inputField = document.getElementById('command-input');
        const historyDiv = document.getElementById('history');
        const inputContainer = document.getElementById('input-container');
        const asciiContainer = document.getElementById('ascii-header');
        const terminalContent = document.getElementById('terminal-content');
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        const monitorImg = document.getElementById('monitor-img');
        const screenGlass = document.getElementById('screen-glass');

        // Dynamic resizing calculation for the screen overlay
        // This ensures the text area stays pinned to the image even if window resizes
        function resizeScreenArea() {
            // Get the actual rendered dimensions of the image
            const imgRect = monitorImg.getBoundingClientRect();
            
            // Map the percentages to the actual image size, not the window
            screenGlass.style.width = (imgRect.width * 0.615) + 'px';
            screenGlass.style.height = (imgRect.height * 0.77) + 'px';
            
            // Calculate offsets based on where the image is centered
            const offsetX = imgRect.left + (imgRect.width * 0.07);
            const offsetY = imgRect.top + (imgRect.height * 0.10);
            
            screenGlass.style.left = offsetX + 'px';
            screenGlass.style.top = offsetY + 'px';

            if(canvas.style.display === 'block') {
                cancelAnimationFrame(window.matrixAnimation);
                initMatrix();
                drawMatrix();
            }
        }

        // Run resize logic when image loads and on window resize
        monitorImg.addEventListener('load', resizeScreenArea);
        window.addEventListener('resize', resizeScreenArea);
        // Initial call in case image is already cached
        resizeScreenArea();


        // Matrix Rain Setup
        const matrixChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*]*パピプペポ".split("");
        const matrixFontSize = 14;
        let drops = [];

        function initMatrix() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            const columns = canvas.width / matrixFontSize;
            drops = [];
            for (let x = 0; x < columns; x++) { drops[x] = Math.random() * -50; }
        }

        function drawMatrix() {
            ctx.fillStyle = "rgba(5, 5, 5, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#33ff00"; 
            ctx.font = matrixFontSize + "px 'Courier New'";

            for (let i = 0; i < drops.length; i++) {
                const text = matrixChars[Math.floor(Math.random() * matrixChars.length)];
                ctx.fillText(text, i * matrixFontSize, drops[i] * matrixFontSize);

                if (drops[i] * matrixFontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
            window.matrixAnimation = requestAnimationFrame(drawMatrix);
        }

        function startMatrixEffect() {
            initMatrix();
            canvas.style.display = 'block';
            setTimeout(() => { canvas.style.opacity = '1'; }, 50);
            drawMatrix();
        }

        const asciiArt = `
  ____    ____ 
 / ___|  / ___|
| |     | |  _ 
| |___  | |_| |
 \\____|  \\____|

SYSTEM INITIALIZED. VER: 4.8.15.16.23.42
----------------------------------------`;

        const introSequence = [
            "ESTABLISHING SECURE CONNECTION...",
            "BYPASSING SECURITY PROTOCOLS... (JUST KIDDING, IT'S PUBLIC)",
            "WARNING: EXTREME LEVELS OF SKILL DETECTED IN TARGET DIRECTORY.",
            "DECRYPTING HUMOR MODULE... SUCCESS.",
            " " 
        ];

        let currentPromptText = "Do you want to read Claudio's information available on file? (yes/no)";
        let noCount = 0; 
        
        const typingSpeed = 30; 
        const asciiSpeed = 10;  

        async function drawAscii() {
            for (let i = 0; i < asciiArt.length; i++) {
                asciiContainer.textContent += asciiArt.charAt(i);
                await new Promise(resolve => setTimeout(resolve, asciiSpeed));
            }
            await new Promise(resolve => setTimeout(resolve, 500));
        }

        async function typeText(text) {
            inputContainer.style.display = 'none'; 
            const p = document.createElement('p');
            historyDiv.appendChild(p);
            
            for (let i = 0; i < text.length; i++) {
                p.textContent += text.charAt(i);
                await new Promise(resolve => setTimeout(resolve, typingSpeed));
            }
            
            inputContainer.style.display = 'flex';
            inputField.focus();
            scrollToBottom();
        }

        function scrollToBottom() {
            terminalContent.scrollTop = terminalContent.scrollHeight;
        }

        window.onload = async () => {
            // Force layout calculation before starting animations
            resizeScreenArea();
            
            await drawAscii();
            for (const line of introSequence) {
                await typeText(line);
                await new Promise(resolve => setTimeout(resolve, 400));
            }
            await typeText(currentPromptText);
        };

        inputField.addEventListener('keydown', async function(event) {
            if (event.key === 'Enter' && inputContainer.style.display !== 'none') {
                const command = inputField.value.trim().toLowerCase();
                
                const userEcho = document.createElement('p');
                userEcho.textContent = "> " + inputField.value;
                historyDiv.appendChild(userEcho);
                
                inputField.value = ''; 
                scrollToBottom();

                if (command === 'yes' || command === 'y') {
                    await typeText("Entering the matrix...");
                    inputContainer.style.display = 'none'; 
                    
                    setTimeout(() => {
                        startMatrixEffect();
                        setTimeout(() => {
                            window.location.href = "cv.html"; 
                        }, 3000);
                    }, 500);

                } else if (command === 'no' || command === 'n') {
                    noCount++;
                    await typeText("Command Not recognized.");
                    
                    if (noCount === 1) {
                        currentPromptText = "Do you want to read Claudio's information available on file? (yes/no) (you don't really have another option)";
                    } else {
                        currentPromptText = "System notice: There is genuinely nothing else to display here. Terminate the session if you truly wish to forfeit access to the classified data on file. Do you want to reconsider your decision and access the information instead?";
                    }

                    setTimeout(() => { typeText(currentPromptText); }, 400);

                } else if (command === 'blog' && noCount >= 2) {
                    await typeText("Accessing hidden blog directory. Entering the matrix...");
                    inputContainer.style.display = 'none'; 
                    
                    setTimeout(() => {
                        startMatrixEffect();
                        setTimeout(() => {
                            window.location.href = "http://www.claudiogiordani.com/blog"; 
                        }, 3000);
                    }, 500);

                } else {
                    await typeText("Command Not recognized.");
                    setTimeout(() => { typeText(currentPromptText); }, 400);
                }
            }
        });

        document.addEventListener('click', () => {
            if (inputContainer.style.display !== 'none') {
                inputField.focus();
            }
        });
    </script>
</body>
</html>
