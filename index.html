<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claudio's Terminal</title>
    <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="96x96" href="favicon/favicon-96x96.png">
    <link rel="apple-touch-icon" href="favicon/apple-touch-icon.png">
    <link rel="manifest" href="favicon/site.webmanifest">
    <style>
        /* The main background */
        body {
            background-color: #050505; /* Very dark background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* * The container that holds BOTH the monitor image AND the screen content.
         * The aspect ratio of your provided image is roughly 1.27 : 1 (800x630)
         */
        .terminal-wrapper {
            position: relative;
            width: 90vw; /* Scales with screen width */
            max-width: 1200px; /* Prevents it from getting too huge on ultrawide monitors */
            aspect-ratio: 1.27 / 1; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The image of the monitor frame */
        .monitor-frame-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10; /* The frame sits ON TOP */
            pointer-events: none; /* Clicks pass through to the screen/input */
        }

        /* The glowing glass screen sitting BEHIND the frame */
        .screen {
            position: absolute; /* Changed to absolute to position freely inside wrapper */
            background-color: #080a08; /* Dark, almost black background for the tube */
            
            /* * PRECISE COORDINATES FOR 'apple-monitor-frame.png'
             * These percentages align perfectly with the transparent window in your image.
             */
            top: 10.5%;
            left: 7.5%;
            width: 72.5%;
            height: 74.5%;
            
            border-radius: 12px; /* Slight curve to match the inner bezel */
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(51, 255, 0, 0.15); /* Subtle inner glow */
            color: #33ff00;
            font-size: 18px; /* Fixed font size as requested */
            text-shadow: 0 0 5px #33ff00, 0 0 10px #1a8000;
            z-index: 5; /* Sits behind the frame image */
        }

        /* Matrix Canvas Layer */
        #matrix-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20; 
            display: none;
            opacity: 0;
            transition: opacity 1s ease; 
        }

        /* The curved screen bulge/vignette effect */
        .vignette {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            z-index: 101;
        }

        /* Simulates CRT scanlines */
        .crt-effect {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }

        /* The container where the text actually lives */
        .terminal-container {
            padding: 30px;
            position: relative;
            z-index: 10;
            height: 100%;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .terminal-container::-webkit-scrollbar { display: none; }
        .terminal-container { -ms-overflow-style: none; scrollbar-width: none; }

        pre { margin: 0 0 20px 0; font-family: inherit; }
        p { margin: 10px 0; min-height: 20px; }
        .input-line { display: none; align-items: center; margin-top: 10px; }

        input[type="text"] {
            background: transparent;
            border: none;
            color: #33ff00;
            font-family: 'Courier New', Courier, monospace;
            font-size: inherit;
            outline: none;
            width: 100%;
            margin-left: 10px;
            text-shadow: 0 0 5px #33ff00;
            caret-color: #33ff00;
        }
    </style>
</head>
<body>
    
    <div class="terminal-wrapper">
        <img src="apple-monitor-frame.png" alt="Monitor Frame" class="monitor-frame-image">

        <div class="screen">
            <canvas id="matrix-canvas"></canvas>
            <div class="vignette"></div>
            <div class="crt-effect"></div>
            
            <div class="terminal-container" id="terminal-content">
                <pre id="ascii-header"></pre>
                <div id="history"></div>
                <div class="input-line" id="input-container">
                    <span>></span>
                    <input type="text" id="command-input" autocomplete="off" spellcheck="false">
                </div>
            </div>
        </div>
    </div>

    <script>
        const inputField = document.getElementById('command-input');
        const historyDiv = document.getElementById('history');
        const inputContainer = document.getElementById('input-container');
        const asciiContainer = document.getElementById('ascii-header');
        const terminalContent = document.getElementById('terminal-content');
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        // Matrix Rain Setup
        const matrixChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*]*パピプペポ".split("");
        const matrixFontSize = 16;
        let drops = [];

        function initMatrix() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            const columns = canvas.width / matrixFontSize;
            drops = [];
            for (let x = 0; x < columns; x++) { drops[x] = 1; }
        }

        function drawMatrix() {
            ctx.fillStyle = "rgba(5, 5, 5, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#33ff00"; 
            ctx.font = matrixFontSize + "px 'Courier New'";

            for (let i = 0; i < drops.length; i++) {
                const text = matrixChars[Math.floor(Math.random() * matrixChars.length)];
                ctx.fillText(text, i * matrixFontSize, drops[i] * matrixFontSize);

                if (drops[i] * matrixFontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
            window.matrixAnimation = requestAnimationFrame(drawMatrix);
        }

        function startMatrixEffect() {
            initMatrix();
            canvas.style.display = 'block';
            setTimeout(() => { canvas.style.opacity = '1'; }, 50);
            drawMatrix();
        }

        const asciiArt = `
  ____    ____ 
 / ___|  / ___|
| |     | |  _ 
| |___  | |_| |
 \\____|  \\____|

SYSTEM INITIALIZED. VER: 4.8.15.16.23.42
----------------------------------------`;

        const introSequence = [
            "ESTABLISHING SECURE CONNECTION...",
            "BYPASSING SECURITY PROTOCOLS... (JUST KIDDING, IT'S PUBLIC)",
            "WARNING: EXTREME LEVELS OF SKILL DETECTED IN TARGET DIRECTORY.",
            "DECRYPTING HUMOR MODULE... SUCCESS.",
            " " 
        ];

        let currentPromptText = "Do you want to read Claudio's information available on file? (yes/no)";
        let noCount = 0; 
        
        const typingSpeed = 30; 
        const asciiSpeed = 10;  

        async function drawAscii() {
            for (let i = 0; i < asciiArt.length; i++) {
                asciiContainer.textContent += asciiArt.charAt(i);
                await new Promise(resolve => setTimeout(resolve, asciiSpeed));
            }
            await new Promise(resolve => setTimeout(resolve, 500));
        }

        async function typeText(text) {
            inputContainer.style.display = 'none'; 
            const p = document.createElement('p');
            historyDiv.appendChild(p);
            
            for (let i = 0; i < text.length; i++) {
                p.textContent += text.charAt(i);
                await new Promise(resolve => setTimeout(resolve, typingSpeed));
            }
            
            inputContainer.style.display = 'flex';
            inputField.focus();
            scrollToBottom();
        }

        function scrollToBottom() {
            terminalContent.scrollTop = terminalContent.scrollHeight;
        }

        window.onload = async () => {
            await drawAscii();
            for (const line of introSequence) {
                await typeText(line);
                await new Promise(resolve => setTimeout(resolve, 400));
            }
            await typeText(currentPromptText);
        };

        window.addEventListener('resize', () => {
            if(canvas.style.display === 'block') initMatrix();
        });

        inputField.addEventListener('keydown', async function(event) {
            if (event.key === 'Enter' && inputContainer.style.display !== 'none') {
                const command = inputField.value.trim().toLowerCase();
                
                const userEcho = document.createElement('p');
                userEcho.textContent = "> " + inputField.value;
                historyDiv.appendChild(userEcho);
                
                inputField.value = ''; 
                scrollToBottom();

                if (command === 'yes' || command === 'y') {
                    await typeText("Entering the matrix...");
                    inputContainer.style.display = 'none'; 
                    
                    setTimeout(() => {
                        startMatrixEffect();
                        setTimeout(() => {
                            window.location.href = "cv.html"; 
                        }, 3000);
                    }, 500);

                } else if (command === 'no' || command === 'n') {
                    noCount++;
                    await typeText("Command Not recognized.");
                    
                    if (noCount === 1) {
                        currentPromptText = "Do you want to read Claudio's information available on file? (yes/no) (you don't really have another option)";
                    } else {
                        currentPromptText = "System notice: There is genuinely nothing else to display here. Terminate the session if you truly wish to forfeit access to the classified data on file. Do you want to reconsider your decision and access the information instead?";
                    }

                    setTimeout(() => {
                        typeText(currentPromptText);
                    }, 400);

                } else if (command === 'blog' && noCount >= 2) {
                    await typeText("Accessing hidden blog directory. Entering the matrix...");
                    inputContainer.style.display = 'none'; 
                    
                    setTimeout(() => {
                        startMatrixEffect();
                        setTimeout(() => {
                            window.location.href = "http://www.claudiogiordani.com/blog"; 
                        }, 3000);
                    }, 500);

                } else {
                    await typeText("Command Not recognized.");
                    setTimeout(() => {
                        typeText(currentPromptText);
                    }, 400);
                }
            }
        });

        document.addEventListener('click', () => {
            if (inputContainer.style.display !== 'none') {
                inputField.focus();
            }
        });
    </script>
</body>
</html>
