<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claudio's Terminal</title>
    <style>
        /* The dark room behind the monitor */
        body {
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        /* The physical plastic monitor frame */
        .monitor-frame {
            background-color: #1a1a1a;
            padding: 3vw;
            border-radius: 30px;
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.9), 
                inset 0 5px 15px rgba(255,255,255,0.05),
                inset 0 -5px 15px rgba(0,0,0,0.5);
            width: 90vw;
            max-width: 900px;
            height: 80vh;
            position: relative;
        }

        /* The glass screen */
        .screen {
            background-color: #050505;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(51, 255, 0, 0.2);
            color: #33ff00;
            font-size: 18px;
            text-shadow: 0 0 5px #33ff00, 0 0 10px #1a8000;
        }

        /* Matrix Canvas Layer */
        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20; /* Sits above text, below CRT effects */
            display: none;
            opacity: 0;
            transition: opacity 1s ease; /* Smooth fade in */
        }

        /* The curved screen bulge/vignette effect */
        .vignette {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 101;
        }

        /* Simulates CRT scanlines */
        .crt-effect {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }

        .terminal-container {
            padding: 30px;
            position: relative;
            z-index: 10;
            height: 100%;
            box-sizing: border-box;
            overflow-y: auto;
        }

        /* Hide scrollbar for maximum realism */
        .terminal-container::-webkit-scrollbar {
            display: none;
        }
        .terminal-container {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        pre {
            margin: 0 0 20px 0;
            font-family: inherit;
        }

        p {
            margin: 10px 0;
            min-height: 20px; 
        }

        .input-line {
            display: none;
            align-items: center;
            margin-top: 10px;
        }

        input[type="text"] {
            background: transparent;
            border: none;
            color: #33ff00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            outline: none;
            width: 100%;
            margin-left: 10px;
            text-shadow: 0 0 5px #33ff00;
            caret-color: #33ff00;
        }
    </style>
</head>
<body>
    
    <div class="monitor-frame">
        <div class="screen">
            <canvas id="matrix-canvas"></canvas>
            <div class="vignette"></div>
            <div class="crt-effect"></div>
            
            <div class="terminal-container">
                <pre id="ascii-header"></pre>
                <div id="history"></div>
                <div class="input-line" id="input-container">
                    <span>></span>
                    <input type="text" id="command-input" autocomplete="off" spellcheck="false">
                </div>
            </div>
        </div>
    </div>

    <script>
        const inputField = document.getElementById('command-input');
        const historyDiv = document.getElementById('history');
        const inputContainer = document.getElementById('input-container');
        const asciiContainer = document.getElementById('ascii-header');
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        // Matrix Rain Setup
        const matrixChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*]*".split("");
        const matrixFontSize = 16;
        let drops = [];

        function initMatrix() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            const columns = canvas.width / matrixFontSize;
            for (let x = 0; x < columns; x++) {
                drops[x] = 1;
            }
        }

        function drawMatrix() {
            // Translucent black background to create the fade effect on old characters
            ctx.fillStyle = "rgba(5, 5, 5, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#33ff00"; 
            ctx.font = matrixFontSize + "px 'Courier New'";

            for (let i = 0; i < drops.length; i++) {
                const text = matrixChars[Math.floor(Math.random() * matrixChars.length)];
                ctx.fillText(text, i * matrixFontSize, drops[i] * matrixFontSize);

                // Reset drop to top randomly to create the staggered rain effect
                if (drops[i] * matrixFontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
            requestAnimationFrame(drawMatrix);
        }

        function startMatrixEffect() {
            initMatrix();
            canvas.style.display = 'block';
            // Slight delay before fading in
            setTimeout(() => { canvas.style.opacity = '1'; }, 50);
            drawMatrix();
        }

        // The CG ASCII Art
        const asciiArt = `
  ____    ____ 
 / ___|  / ___|
| |     | |  _ 
| |___  | |_| |
 \\____|  \\____|

SYSTEM INITIALIZED. VER: 1.0
----------------------------`;

        const introSequence = [
            "ESTABLISHING SECURE CONNECTION...",
            "BYPASSING SECURITY PROTOCOLS... (JUST KIDDING, IT'S PUBLIC)",
            "WARNING: EXTREME LEVELS OF SKILL DETECTED IN TARGET DIRECTORY.",
            "DECRYPTING HUMOR MODULE... SUCCESS.",
            " " 
        ];

        // This variable can change based on what the user types
        let currentPromptText = "Do you want to read Claudio's information available on file? (yes/no)";
        
        const typingSpeed = 30; 
        const asciiSpeed = 10;  

        async function drawAscii() {
            for (let i = 0; i < asciiArt.length; i++) {
                asciiContainer.textContent += asciiArt.charAt(i);
                await new Promise(resolve => setTimeout(resolve, asciiSpeed));
            }
            await new Promise(resolve => setTimeout(resolve, 500));
        }

        async function typeText(text) {
            inputContainer.style.display = 'none'; 
            const p = document.createElement('p');
            historyDiv.appendChild(p);
            
            for (let i = 0; i < text.length; i++) {
                p.textContent += text.charAt(i);
                await new Promise(resolve => setTimeout(resolve, typingSpeed));
            }
            
            inputContainer.style.display = 'flex';
            inputField.focus();
            scrollToBottom();
        }

        function scrollToBottom() {
            const container = document.querySelector('.terminal-container');
            container.scrollTop = container.scrollHeight;
        }

        window.onload = async () => {
            await drawAscii();
            for (const line of introSequence) {
                await typeText(line);
                await new Promise(resolve => setTimeout(resolve, 400));
            }
            await typeText(currentPromptText);
        };

        // Window resize handler for Matrix canvas
        window.addEventListener('resize', () => {
            if(canvas.style.display === 'block') initMatrix();
        });

        inputField.addEventListener('keydown', async function(event) {
            if (event.key === 'Enter' && inputContainer.style.display !== 'none') {
                const command = inputField.value.trim().toLowerCase();
                
                const userEcho = document.createElement('p');
                userEcho.textContent = "> " + inputField.value;
                historyDiv.appendChild(userEcho);
                
                inputField.value = ''; 
                scrollToBottom();

                if (command === 'yes' || command === 'y') {
                    // Start the Matrix sequence
                    await typeText("Entering the matrix...");
                    inputContainer.style.display = 'none'; // Hide input permanently
                    
                    setTimeout(() => {
                        startMatrixEffect();
                        // Wait 3 seconds to show off the rain, then redirect
                        setTimeout(() => {
                            window.location.href = "cv.html"; 
                        }, 3000);
                    }, 500);

                } else if (command === 'no' || command === 'n') {
                    // The cheeky "no" response
                    await typeText("Command Not recognized.");
                    currentPromptText = "Do you want to read Claudio's information available on file? (yes/no) (you don't really have another option)";
                    setTimeout(() => {
                        typeText(currentPromptText);
                    }, 400);

                } else {
                    // Standard error response
                    await typeText("Command Not recognized.");
                    setTimeout(() => {
                        typeText(currentPromptText);
                    }, 400);
                }
            }
        });

        document.addEventListener('click', () => {
            if (inputContainer.style.display !== 'none') {
                inputField.focus();
            }
        });
    </script>
</body>
</html>
