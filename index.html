<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claudio's Terminal</title>
    <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="96x96" href="favicon/favicon-96x96.png">
    <link rel="apple-touch-icon" href="favicon/apple-touch-icon.png">
    <link rel="manifest" href="favicon/site.webmanifest">
    <style>
        /* Base page styling */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #050505;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }

        .terminal-wrapper {
            position: relative;
            width: 90vw; 
            max-width: 1200px; 
            aspect-ratio: 1.27 / 1; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .monitor-frame-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10; 
            pointer-events: none; 
        }

        .screen {
            position: absolute; 
            background-color: #080a08; 
            top: 10.5%;
            left: 8.5%;    
            width: 74%;    
            height: 74.5%;
            border-radius: 12px; 
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(51, 255, 0, 0.15); 
            color: #33ff00;
            font-size: 18px; 
            text-shadow: 0 0 5px #33ff00, 0 0 10px #1a8000;
            z-index: 5; 
        }

        #matrix-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20; 
            display: none;
            opacity: 0;
            transition: opacity 1s ease; 
        }

        .crt-vignette {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(0,0,0,0.8) 110%);
            pointer-events: none;
            z-index: 101;
        }

        .crt-effect {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes phosphorPulse {
            0%, 100% { text-shadow: 0 0 3px #33ff00, 0 0 8px #1a8000; opacity: 0.95; }
            50% { text-shadow: 0 0 5px #33ff00, 0 0 12px #20a000; opacity: 1; }
        }

        .terminal-container {
            padding: 40px 40px 30px 50px; 
            position: relative;
            z-index: 10;
            height: 100%;
            box-sizing: border-box;
            overflow-y: auto;
            animation: phosphorPulse 4s infinite alternate ease-in-out;
        }

        .terminal-container::-webkit-scrollbar { display: none; }
        .terminal-container { -ms-overflow-style: none; scrollbar-width: none; }

        pre { margin: 0 0 20px 0; font-family: inherit; }
        p { margin: 10px 0; min-height: 20px; }
        .input-line { display: none; align-items: center; margin-top: 10px; }

        input[type="text"] {
            background: transparent;
            border: none;
            color: #33ff00;
            font-family: 'Courier New', Courier, monospace;
            font-size: inherit;
            outline: none;
            width: 100%;
            margin-left: 10px;
            text-shadow: 0 0 5px #33ff00;
            caret-color: transparent; 
            background: linear-gradient(90deg, #33ff00 11px, transparent 0) no-repeat;
            background-size: 11px 1.2em;
            background-position: calc(1ch * var(--char-count, 0)) center;
        }
    </style>
</head>
<body>
    
    <div class="terminal-wrapper">
        <img src="apple-monitor-frame.png" alt="Monitor Frame" class="monitor-frame-image">

        <div class="screen">
            <canvas id="matrix-canvas"></canvas>
            <div class="vignette crt-vignette"></div> 
            <div class="crt-effect"></div>
            
            <div class="terminal-container" id="terminal-content">
                <pre id="ascii-header"></pre>
                <div id="history"></div>
                <div class="input-line" id="input-container">
                    <span>></span>
                    <input type="text" id="command-input" autocomplete="off" spellcheck="false">
                </div>
            </div>
        </div>
    </div>

    <script>
        const inputField = document.getElementById('command-input');
        const historyDiv = document.getElementById('history');
        const inputContainer = document.getElementById('input-container');
        const asciiContainer = document.getElementById('ascii-header');
        const terminalContent = document.getElementById('terminal-content');
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        // Block Cursor Tracking
        inputField.addEventListener('input', () => {
            inputField.style.setProperty('--char-count', inputField.value.length);
        });

        // Matrix Rain Setup
        const matrixChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*]*パピプペポ".split("");
        const matrixFontSize = 16;
        let drops = [];

        function initMatrix() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            const columns = canvas.width / matrixFontSize;
            drops = [];
            for (let x = 0; x < columns; x++) { drops[x] = 1; }
        }

        function drawMatrix() {
            ctx.fillStyle = "rgba(5, 5, 5, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#33ff00"; 
            ctx.font = matrixFontSize + "px 'Courier New'";
            for (let i = 0; i < drops.length; i++) {
                const text = matrixChars[Math.floor(Math.random() * matrixChars.length)];
                ctx.fillText(text, i * matrixFontSize, drops[i] * matrixFontSize);
                if (drops[i] * matrixFontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
            window.matrixAnimation = requestAnimationFrame(drawMatrix);
        }

        function startMatrixEffect() {
            initMatrix();
            canvas.style.display = 'block';
            setTimeout(() => { canvas.style.opacity = '1'; }, 50);
            drawMatrix();
        }

        const asciiArt = `
  ____    ____ 
 / ___|  / ___|
| |     | |  _ 
| |___  | |_| |
 \\____|  \\____|

SYSTEM INITIALIZED. VER: 4.8.15.16.23.42
----------------------------------------`;

        const introSequence = [
            "ESTABLISHING SECURE CONNECTION...",
            "BYPASSING SECURITY PROTOCOLS... (JUST KIDDING, IT'S PUBLIC)",
            "WARNING: EXTREME LEVELS OF SKILL DETECTED IN TARGET DIRECTORY.",
            "DECRYPTING HUMOR MODULE... SUCCESS.",
            " " 
        ];

        let currentMode = 'terminal'; 
        let currentPromptText = "Do you want to read Claudio's information available on file? (yes/no)";
        let noCount = 0; 
        
        const typingSpeed = 30; 
        const asciiSpeed = 10;  

        async function drawAscii() {
            for (let i = 0; i < asciiArt.length; i++) {
                asciiContainer.textContent += asciiArt.charAt(i);
                await new Promise(resolve => setTimeout(resolve, asciiSpeed));
            }
            await new Promise(resolve => setTimeout(resolve, 500));
        }

        async function typeText(text) {
            inputContainer.style.display = 'none'; 
            const p = document.createElement('p');
            historyDiv.appendChild(p);
            
            for (let i = 0; i < text.length; i++) {
                p.textContent += text.charAt(i);
                await new Promise(resolve => setTimeout(resolve, typingSpeed));
            }
            
            inputContainer.style.display = 'flex';
            inputField.focus();
            scrollToBottom();
        }

        function scrollToBottom() {
            terminalContent.scrollTop = terminalContent.scrollHeight;
        }

        window.onload = async () => {
            await drawAscii();
            for (const line of introSequence) {
                await typeText(line);
                await new Promise(resolve => setTimeout(resolve, 400));
            }
            await typeText(currentPromptText);
        };

        window.addEventListener('resize', () => {
            if(canvas.style.display === 'block') initMatrix();
        });


        // ==========================================
        // TEXT ADVENTURE ENGINE: PROJECT NEON
        // ==========================================
        let inventory = [];
        let currentRoom = 'cell';

        const map = {
            'cell': {
                name: "Holding Cell 404",
                desc: "A cramped, sterile box. A neon billboard outside casts shadows through a barred window. The door to the NORTH is open.",
                exits: { 'north': 'detention', 'n': 'detention' },
                items: [],
                details: { 'window': "It's raining outside. The megacity looks like a glowing circuit board.", 'door': "The lock mechanism is busted. Lucky you." }
            },
            'detention': {
                name: "Detention Block",
                desc: "A long row of empty cells. The air smells of ozone. Corridors branch out NORTH, EAST, and WEST. Your cell is SOUTH.",
                exits: { 'south': 'cell', 's': 'cell', 'north': 'corridor_a', 'n': 'corridor_a', 'east': 'evidence', 'e': 'evidence', 'west': 'interrogation', 'w': 'interrogation' },
                items: [],
                details: {}
            },
            'interrogation': {
                name: "Interrogation Room",
                desc: "A metal table, two chairs, and a broken camera. Someone left in a hurry.",
                exits: { 'east': 'detention', 'e': 'detention' },
                items: ['silver_key'],
                details: { 'table': "There are deep scratches in the metal.", 'camera': "The lens is smashed to pieces." }
            },
            'evidence': {
                name: "Evidence Locker",
                desc: "Rows of wire mesh lockers. Most have been looted.",
                exits: { 'west': 'detention', 'w': 'detention' },
                items: ['datapad'],
                locked: true,
                key: 'silver_key',
                lockedMsg: "A heavy steel padlock secures the mesh gate. It requires a physical 'silver_key'.",
                details: { 'datapad': "A cracked tablet. It contains mostly corrupted data, but you can clearly read a staff_memo." }
            },
            'corridor_a': {
                name: "Corridor Alpha",
                desc: "Fluorescent tubes flicker overhead. A heavy security door blocks the NORTH. A break room is to the EAST. A maintenance shaft is WEST.",
                exits: { 'south': 'detention', 's': 'detention', 'east': 'break_room', 'e': 'break_room', 'west': 'shaft', 'w': 'shaft', 'north': 'checkpoint', 'n': 'checkpoint' },
                items: [],
                details: {}
            },
            'break_room': {
                name: "Staff Break Room",
                desc: "Stale synth-coffee sits in a pot. A crumpled staff_memo lies on the table.",
                exits: { 'west': 'corridor_a', 'w': 'corridor_a' },
                items: ['staff_memo', 'mug'],
                details: { 'staff_memo': "It reads: 'Reminder: The maintenance shaft is off-limits. Someone dropped the blue_keycard down there again.'", 'mug': "It says 'World's Okayest Guard'." }
            },
            'shaft': {
                name: "Maintenance Shaft",
                desc: "It's pitch black, cramped, and smells like rat decay. You can barely move.",
                exits: { 'east': 'corridor_a', 'e': 'corridor_a' },
                items: ['blue_keycard'],
                details: {}
            },
            'checkpoint': {
                name: "Security Checkpoint",
                desc: "A fortified guard post. The path continues NORTH into the executive level.",
                exits: { 'south': 'corridor_a', 's': 'corridor_a', 'north': 'corridor_b', 'n': 'corridor_b' },
                locked: true,
                key: 'blue_keycard',
                lockedMsg: "The blast doors are sealed tight. A glowing terminal reads: 'INSERT BLUE_KEYCARD'.",
                details: {}
            },
            'corridor_b': {
                name: "Corridor Beta",
                desc: "Executive level. Plush carpet, ambient synth music. Offices to the EAST and WEST. The main lobby is NORTH.",
                exits: { 'south': 'checkpoint', 's': 'checkpoint', 'east': 'admin', 'e': 'admin', 'west': 'server', 'w': 'server', 'north': 'lobby', 'n': 'lobby' },
                items: [],
                details: {}
            },
            'admin': {
                name: "Admin Office",
                desc: "A massive mahogany desk sits in front of a shattered skyline window. An open wall safe catches your eye.",
                exits: { 'west': 'corridor_b', 'w': 'corridor_b' },
                items: ['gold_keycard'],
                details: { 'safe': "It's open and completely empty, except for a shiny gold_keycard.", 'window': "The wind howls through the broken glass." }
            },
            'server': {
                name: "Server Core",
                desc: "Rows of humming quantum mainframes glowing a menacing red.",
                exits: { 'east': 'corridor_b', 'e': 'corridor_b' },
                items: ['override_usb'],
                locked: true,
                key: 'gold_keycard',
                lockedMsg: "Retinal scanner damaged. The backup physical lock requires executive clearance (a 'gold_keycard').",
                details: { 'mainframes': "They are processing terabytes of corporate secrets." }
            },
            'lobby': {
                name: "Main Corporate Lobby",
                desc: "A massive marble foyer with a vaulted glass ceiling. The facility's exterior exit gate is to the NORTH.",
                exits: { 'south': 'corridor_b', 's': 'corridor_b', 'north': 'gate', 'n': 'gate' },
                items: [],
                details: {}
            },
            'gate': {
                name: "Exit Gate",
                desc: "You shouldn't be reading this.",
                exits: { 'south': 'lobby', 's': 'lobby' },
                items: [],
                locked: true,
                key: 'override_usb',
                lockedMsg: "The titan-steel shutters are down. The control terminal flashes: 'INSERT OVERRIDE_USB TO INITIATE EXIT SEQUENCE'.",
                details: {}
            }
        };

        async function handleGameCommand(cmd) {
            let room = map[currentRoom];
            
            // Basic parser: split by space. Verbs are first word, targets are the rest.
            let parts = cmd.split(' ');
            let verb = parts[0];
            let target = parts.slice(1).join(' ');

            if (verb === 'quit' || verb === 'exit') {
                currentMode = 'terminal';
                historyDiv.innerHTML = ''; 
                await typeText("Aborting simulation module...");
                await typeText(currentPromptText);
                return;
            }

            if (verb === 'look' || verb === 'l') {
                await typeText(`[ ${room.name} ]`);
                await typeText(room.desc);
                if (room.items.length > 0) {
                    await typeText(`Items here: ${room.items.join(', ')}`);
                }
                return;
            }

            if (verb === 'inv' || verb === 'inventory' || verb === 'i') {
                if (inventory.length === 0) {
                    await typeText("You are not carrying anything.");
                } else {
                    await typeText(`Inventory: ${inventory.join(', ')}`);
                }
                return;
            }

            if (verb === 'help') {
                await typeText("GAME COMMANDS:");
                await typeText("- Move: north (n), south (s), east (e), west (w)");
                await typeText("- Actions: look (l), inv (i), take [item], examine [object/item]");
                await typeText("- quit: exit the game");
                return;
            }

            // Examine functionality
            if (['examine', 'x', 'read'].includes(verb)) {
                if (!target) {
                    await typeText("Examine what? (e.g., 'examine window')");
                } else if (room.details && room.details[target]) {
                    await typeText(room.details[target]);
                } else if (room.items.includes(target) || inventory.includes(target)) {
                    await typeText(`It's a ${target}. It looks important.`);
                } else {
                    await typeText(`You don't see anything special about the '${target}'.`);
                }
                return;
            }

            // Take functionality
            if (['take', 'get', 'grab'].includes(verb)) {
                if (!target) {
                    await typeText("Take what? (e.g., 'take silver_key')");
                } else if (room.items.includes(target)) {
                    inventory.push(target);
                    room.items = room.items.filter(i => i !== target);
                    await typeText(`You picked up the ${target}.`);
                } else {
                    await typeText(`There is no ${target} here to take.`);
                }
                return;
            }

            // Movement functionality
            if (['north', 'n', 'south', 's', 'east', 'e', 'west', 'w'].includes(verb)) {
                
                // Allow "n" to map to "north" for looking up exits
                let direction = verb;
                if (verb === 'n') direction = 'north';
                if (verb === 's') direction = 'south';
                if (verb === 'e') direction = 'east';
                if (verb === 'w') direction = 'west';

                if (room.exits[direction] || room.exits[verb]) {
                    let nextRoomKey = room.exits[direction] || room.exits[verb];
                    let nextRoom = map[nextRoomKey];

                    // Check if next room is locked
                    if (nextRoom.locked && !inventory.includes(nextRoom.key)) {
                        await typeText(nextRoom.lockedMsg);
                    } else {
                        // Unlock sequence
                        if (nextRoom.locked && inventory.includes(nextRoom.key)) {
                            await typeText(`>>> Used ${nextRoom.key}. Access granted.`);
                            nextRoom.locked = false; // Unlock it permanently
                        }
                        
                        currentRoom = nextRoomKey;
                        
                        // WIN CONDITION: Entering the gate room with the USB
                        if (currentRoom === 'gate') {
                            await typeText("You jam the OVERRIDE_USB into the terminal port...");
                            await typeText("ACCESS ACCEPTED. System locks disengaged.");
                            await typeText("The massive titan-steel shutters grind open, flooding the lobby with blinding neon light.");
                            await typeText("You step out into the rain. You are free.");
                            await typeText(" ");
                            await typeText("===================================");
                            await typeText(">>> PROJECT NEON SIMULATION COMPLETE <<<");
                            await typeText("===================================");
                            await typeText(" ");
                            
                            currentMode = 'terminal';
                            setTimeout(() => { typeText("System rebooting... Do you want to read Claudio's information available on file? (yes/no)"); }, 4000);
                        } else {
                            // Normal movement description
                            await typeText(`[ ${map[currentRoom].name} ]`);
                            await typeText(map[currentRoom].desc);
                            if (map[currentRoom].items.length > 0) {
                                await typeText(`Items here: ${map[currentRoom].items.join(', ')}`);
                            }
                        }
                    }
                } else {
                    await typeText("You can't go that way. There is a wall there.");
                }
                return;
            }

            await typeText("I don't understand that command. Type 'help' for options.");
        }

        // ==========================================
        // MAIN INPUT LISTENER
        // ==========================================
        inputField.addEventListener('keydown', async function(event) {
            
            // AUDIO ON FOR ALL KEYPRESSES
            if(event.key !== 'Enter') { 
                new Audio('keypress.mp3').play(); 
            }

            if (event.key === 'Enter' && inputContainer.style.display !== 'none') {
                
                // AUDIO ON FOR ENTER KEY
                new Audio('keypress.mp3').play();

                const command = inputField.value.trim().toLowerCase();
                const userEcho = document.createElement('p');
                userEcho.textContent = "> " + inputField.value;
                historyDiv.appendChild(userEcho);
                
                inputField.value = ''; 
                inputField.style.setProperty('--char-count', 0);
                scrollToBottom();

                // DIVERGE BASED ON STATE
                if (currentMode === 'game') {
                    await handleGameCommand(command);
                } 
                else if (currentMode === 'terminal') {
                    
                    if (command === 'yes' || command === 'y') {
                        await typeText("Entering the matrix...");
                        inputContainer.style.display = 'none'; 
                        setTimeout(() => {
                            startMatrixEffect();
                            setTimeout(() => { window.location.href = "cv.html"; }, 3000);
                        }, 500);

                    } else if (command === 'no' || command === 'n') {
                        noCount++;
                        await typeText("Command Not recognized.");
                        if (noCount === 1) {
                            currentPromptText = "Do you want to read Claudio's information available on file? (yes/no) (you don't really have another option)";
                        } else {
                            currentPromptText = "System notice: There is genuinely nothing else to display here. Terminate the session if you truly wish to forfeit access to the classified data on file. Do you want to reconsider your decision and access the information instead?";
                        }
                        setTimeout(() => { typeText(currentPromptText); }, 400);

                    } else if (command === 'blog' && noCount >= 2) {
                        await typeText("Accessing hidden blog directory. Entering the matrix...");
                        inputContainer.style.display = 'none'; 
                        setTimeout(() => {
                            startMatrixEffect();
                            setTimeout(() => { window.location.href = "http://www.claudiogiordani.com/blog"; }, 3000);
                        }, 500);

                    } else if (command === 'clear') {
                        historyDiv.innerHTML = '';
                        setTimeout(() => { typeText(currentPromptText); }, 200);

                    } else if (command === 'help') {
                        await typeText("AVAILABLE COMMANDS: yes, no, clear, play, whoami, sudo");
                        setTimeout(() => { typeText(currentPromptText); }, 400);

                    } else if (command === 'whoami') {
                        await typeText("GUEST_USER_994. ACCESS LEVEL: RESTRICTED.");
                        setTimeout(() => { typeText(currentPromptText); }, 400);

                    } else if (command === 'sudo') {
                        await typeText("Nice try. This incident will be reported.");
                        setTimeout(() => { typeText(currentPromptText); }, 400);

                    } else if (command === 'play') {
                        currentMode = 'game';
                        currentRoom = 'cell';
                        inventory = []; // Reset game state
                        
                        // Reset locks in case they are playing a second time
                        map['evidence'].locked = true;
                        map['checkpoint'].locked = true;
                        map['server'].locked = true;
                        map['gate'].locked = true;
                        
                        historyDiv.innerHTML = ''; 
                        await typeText("LOADING MODULE: PROJECT NEON...");
                        await typeText("===================================");
                        await typeText(`[ ${map['cell'].name} ]`);
                        await typeText(map['cell'].desc);
                        await typeText("Type 'help' for game commands or 'quit' to exit.");

                    } else {
                        await typeText("Command Not recognized. Type 'help' for options.");
                        setTimeout(() => { typeText(currentPromptText); }, 400);
                    }
                }
            }
        });

        document.addEventListener('click', () => {
            if (inputContainer.style.display !== 'none') {
                inputField.focus();
            }
        });
    </script>
</body>
</html>
