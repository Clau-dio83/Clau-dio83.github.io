<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claudio's Terminal</title>
    <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="96x96" href="favicon/favicon-96x96.png">
    <link rel="apple-touch-icon" href="favicon/apple-touch-icon.png">
    <link rel="manifest" href="favicon/site.webmanifest">
    <style>
        /* Base page styling */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #050505;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }

        /* The scaling wrapper */
        .terminal-wrapper {
            position: relative;
            width: 90vw; 
            max-width: 1200px; 
            aspect-ratio: 1.27 / 1; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The image of the monitor frame */
        .monitor-frame-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10; 
            pointer-events: none; 
        }

        /* The glowing glass screen */
        .screen {
            position: absolute; 
            background-color: #080a08; 
            top: 10.5%;
            left: 8.5%;    
            width: 74%;    
            height: 74.5%;
            border-radius: 12px; 
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(51, 255, 0, 0.15); 
            color: #33ff00;
            font-size: 18px; 
            text-shadow: 0 0 5px #33ff00, 0 0 10px #1a8000;
            z-index: 5; 
        }

        /* Matrix Canvas Layer */
        #matrix-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20; 
            display: none;
            opacity: 0;
            transition: opacity 1s ease; 
        }

        /* CRT Curve Shadow */
        .crt-vignette {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(0,0,0,0.8) 110%);
            pointer-events: none;
            z-index: 101;
        }

        /* CRT Scanlines */
        .crt-effect {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }

        /* Phosphor Pulse Animation */
        @keyframes phosphorPulse {
            0%, 100% { text-shadow: 0 0 3px #33ff00, 0 0 8px #1a8000; opacity: 0.95; }
            50% { text-shadow: 0 0 5px #33ff00, 0 0 12px #20a000; opacity: 1; }
        }

        /* The container where the text actually lives */
        .terminal-container {
            padding: 40px 40px 30px 50px; 
            position: relative;
            z-index: 10;
            height: 100%;
            box-sizing: border-box;
            overflow-y: auto;
            animation: phosphorPulse 4s infinite alternate ease-in-out;
        }

        .terminal-container::-webkit-scrollbar { display: none; }
        .terminal-container { -ms-overflow-style: none; scrollbar-width: none; }

        pre { margin: 0 0 20px 0; font-family: inherit; }
        p { margin: 10px 0; min-height: 20px; }
        .input-line { display: none; align-items: center; margin-top: 10px; }

        /* Retro Block Cursor */
        input[type="text"] {
            background: transparent;
            border: none;
            color: #33ff00;
            font-family: 'Courier New', Courier, monospace;
            font-size: inherit;
            outline: none;
            width: 100%;
            margin-left: 10px;
            text-shadow: 0 0 5px #33ff00;
            caret-color: transparent; 
            background: linear-gradient(90deg, #33ff00 11px, transparent 0) no-repeat;
            background-size: 11px 1.2em;
            background-position: calc(1ch * var(--char-count, 0)) center;
        }
    </style>
</head>
<body>
    
    <div class="terminal-wrapper">
        <img src="apple-monitor-frame.png" alt="Monitor Frame" class="monitor-frame-image">

        <div class="screen">
            <canvas id="matrix-canvas"></canvas>
            
            <div class="vignette crt-vignette"></div> 
            <div class="crt-effect"></div>
            
            <div class="terminal-container" id="terminal-content">
                <pre id="ascii-header"></pre>
                <div id="history"></div>
                <div class="input-line" id="input-container">
                    <span>></span>
                    <input type="text" id="command-input" autocomplete="off" spellcheck="false">
                </div>
            </div>
        </div>
    </div>

    <script>
        const inputField = document.getElementById('command-input');
        const historyDiv = document.getElementById('history');
        const inputContainer = document.getElementById('input-container');
        const asciiContainer = document.getElementById('ascii-header');
        const terminalContent = document.getElementById('terminal-content');
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        // Block Cursor Tracking
        inputField.addEventListener('input', () => {
            inputField.style.setProperty('--char-count', inputField.value.length);
        });

        // Matrix Rain Setup
        const matrixChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*]*パピプペポ".split("");
        const matrixFontSize = 16;
        let drops = [];

        function initMatrix() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            const columns = canvas.width / matrixFontSize;
            drops = [];
            for (let x = 0; x < columns; x++) { drops[x] = 1; }
        }

        function drawMatrix() {
            ctx.fillStyle = "rgba(5, 5, 5, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#33ff00"; 
            ctx.font = matrixFontSize + "px 'Courier New'";

            for (let i = 0; i < drops.length; i++) {
                const text = matrixChars[Math.floor(Math.random() * matrixChars.length)];
                ctx.fillText(text, i * matrixFontSize, drops[i] * matrixFontSize);

                if (drops[i] * matrixFontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
            window.matrixAnimation = requestAnimationFrame(drawMatrix);
        }

        function startMatrixEffect() {
            initMatrix();
            canvas.style.display = 'block';
            setTimeout(() => { canvas.style.opacity = '1'; }, 50);
            drawMatrix();
        }

        const asciiArt = `
  ____    ____ 
 / ___|  / ___|
| |     | |  _ 
| |___  | |_| |
 \\____|  \\____|

SYSTEM INITIALIZED. VER: 4.8.15.16.23.42
----------------------------------------`;

        const introSequence = [
            "ESTABLISHING SECURE CONNECTION...",
            "BYPASSING SECURITY PROTOCOLS... (JUST KIDDING, IT'S PUBLIC)",
            "WARNING: EXTREME LEVELS OF SKILL DETECTED IN TARGET DIRECTORY.",
            "DECRYPTING HUMOR MODULE... SUCCESS.",
            " " 
        ];

        // --- NEW: STATE MANAGEMENT VARIABLES ---
        let currentMode = 'terminal'; // Can be 'terminal' or 'game'
        let gameRoom = 'intro';       // Tracks location in the text adventure
        let hasKeycard = false;       // Tracks inventory
        
        let currentPromptText = "Do you want to read Claudio's information available on file? (yes/no)";
        let noCount = 0; 
        
        const typingSpeed = 30; 
        const asciiSpeed = 10;  

        async function drawAscii() {
            for (let i = 0; i < asciiArt.length; i++) {
                asciiContainer.textContent += asciiArt.charAt(i);
                await new Promise(resolve => setTimeout(resolve, asciiSpeed));
            }
            await new Promise(resolve => setTimeout(resolve, 500));
        }

        async function typeText(text) {
            inputContainer.style.display = 'none'; 
            const p = document.createElement('p');
            historyDiv.appendChild(p);
            
            for (let i = 0; i < text.length; i++) {
                p.textContent += text.charAt(i);
                await new Promise(resolve => setTimeout(resolve, typingSpeed));
            }
            
            inputContainer.style.display = 'flex';
            inputField.focus();
            scrollToBottom();
        }

        function scrollToBottom() {
            terminalContent.scrollTop = terminalContent.scrollHeight;
        }

        window.onload = async () => {
            await drawAscii();
            for (const line of introSequence) {
                await typeText(line);
                await new Promise(resolve => setTimeout(resolve, 400));
            }
            await typeText(currentPromptText);
        };

        window.addEventListener('resize', () => {
            if(canvas.style.display === 'block') initMatrix();
        });

        // The Main Interaction Logic
        inputField.addEventListener('keydown', async function(event) {
            
            // Un-comment the next line to enable sound. You must have a 'keypress.mp3' file in your folder!
            // if(event.key !== 'Enter') { new Audio('keypress.mp3').play(); }

            if (event.key === 'Enter' && inputContainer.style.display !== 'none') {
                
                // new Audio('keypress.mp3').play();

                const command = inputField.value.trim().toLowerCase();
                
                const userEcho = document.createElement('p');
                userEcho.textContent = "> " + inputField.value;
                historyDiv.appendChild(userEcho);
                
                inputField.value = ''; 
                inputField.style.setProperty('--char-count', 0);
                scrollToBottom();

                // ==========================================
                // MODE 1: STANDARD TERMINAL LOGIC
                // ==========================================
                if (currentMode === 'terminal') {
                    
                    if (command === 'yes' || command === 'y') {
                        await typeText("Entering the matrix...");
                        inputContainer.style.display = 'none'; 
                        setTimeout(() => {
                            startMatrixEffect();
                            setTimeout(() => { window.location.href = "cv.html"; }, 3000);
                        }, 500);

                    } else if (command === 'no' || command === 'n') {
                        noCount++;
                        await typeText("Command Not recognized.");
                        if (noCount === 1) {
                            currentPromptText = "Do you want to read Claudio's information available on file? (yes/no) (you don't really have another option)";
                        } else {
                            currentPromptText = "System notice: There is genuinely nothing else to display here. Terminate the session if you truly wish to forfeit access to the classified data on file. Do you want to reconsider your decision and access the information instead?";
                        }
                        setTimeout(() => { typeText(currentPromptText); }, 400);

                    } else if (command === 'blog' && noCount >= 2) {
                        await typeText("Accessing hidden blog directory. Entering the matrix...");
                        inputContainer.style.display = 'none'; 
                        setTimeout(() => {
                            startMatrixEffect();
                            setTimeout(() => { window.location.href = "http://www.claudiogiordani.com/blog"; }, 3000);
                        }, 500);

                    } else if (command === 'clear') {
                        historyDiv.innerHTML = '';
                        setTimeout(() => { typeText(currentPromptText); }, 200);

                    } else if (command === 'help') {
                        await typeText("AVAILABLE COMMANDS: yes, no, clear, play, whoami, sudo");
                        setTimeout(() => { typeText(currentPromptText); }, 400);

                    } else if (command === 'whoami') {
                        await typeText("GUEST_USER_994. ACCESS LEVEL: RESTRICTED.");
                        setTimeout(() => { typeText(currentPromptText); }, 400);

                    } else if (command === 'sudo') {
                        await typeText("Nice try. This incident will be reported.");
                        setTimeout(() => { typeText(currentPromptText); }, 400);

                    // --- NEW: TRIGGER ADVENTURE GAME ---
                    } else if (command === 'play') {
                        currentMode = 'game';
                        gameRoom = 'intro';
                        hasKeycard = false;
                        historyDiv.innerHTML = ''; // Clear screen for game
                        await typeText("LOADING MODULE: SECTOR 7G ESCAPE...");
                        await typeText("===================================");
                        await typeText("You wake up on the cold floor of a dimly lit server room. The rhythmic hum of cooling fans fills the air.");
                        await typeText("There is a heavy steel blast door to the NORTH.");
                        await typeText("To the EAST, a retro computer terminal flickers on a desk.");
                        await typeText("Type 'north' or 'east' to move. Type 'quit' to exit the simulation.");

                    } else {
                        await typeText("Command Not recognized. Type 'help' for options.");
                        setTimeout(() => { typeText(currentPromptText); }, 400);
                    }

                // ==========================================
                // MODE 2: TEXT ADVENTURE LOGIC
                // ==========================================
                } else if (currentMode === 'game') {
                    
                    if (command === 'quit' || command === 'exit') {
                        currentMode = 'terminal';
                        historyDiv.innerHTML = ''; 
                        await typeText("Exiting simulation module...");
                        await typeText(currentPromptText);
                        return;
                    }

                    if (gameRoom === 'intro') {
                        if (command === 'north' || command === 'n') {
                            gameRoom = 'door';
                            await typeText("You stand before the massive blast door. Beside it is a card reader glowing with an angry red light.");
                            await typeText("Type 'south' to go back, or 'use card' if you have one.");
                        } else if (command === 'east' || command === 'e') {
                            gameRoom = 'desk';
                            if (!hasKeycard) {
                                await typeText("You approach the flickering terminal. Sitting beside the keyboard is a RED KEYCARD.");
                                await typeText("Type 'west' to go back, or 'take card' to grab it.");
                            } else {
                                await typeText("You approach the flickering terminal. The desk is empty.");
                                await typeText("Type 'west' to go back.");
                            }
                        } else {
                            await typeText("Invalid command. Try 'north', 'east', or 'quit'.");
                        }

                    } else if (gameRoom === 'door') {
                        if (command === 'south' || command === 's') {
                            gameRoom = 'intro';
                            await typeText("You are back in the center of the server room. Door to the NORTH, terminal to the EAST.");
                        } else if (command === 'use card' || command === 'use' || command === 'swipe card') {
                            if (hasKeycard) {
                                await typeText("You swipe the RED KEYCARD. The reader beeps affirmatively and the light turns green!");
                                await typeText("The heavy blast door grinds open, revealing a bright corridor. You step out into the light...");
                                await typeText(" ");
                                await typeText(">>> ESCAPE SUCCESSFUL <<<");
                                await typeText(" ");
                                
                                // WIN CONDITION: Return to terminal mode and ask original question
                                currentMode = 'terminal';
                                setTimeout(() => { typeText("System rebooting... Do you want to read Claudio's information available on file? (yes/no)"); }, 1500);

                            } else {
                                await typeText("You don't have a keycard! The door remains firmly locked.");
                            }
                        } else {
                            await typeText("Invalid command. Try 'south' or 'use card'.");
                        }

                    } else if (gameRoom === 'desk') {
                        if (command === 'west' || command === 'w') {
                            gameRoom = 'intro';
                            await typeText("You are back in the center of the server room. Door to the NORTH, terminal to the EAST.");
                        } else if (command === 'take card' || command === 'take' || command === 'get card') {
                            if (!hasKeycard) {
                                hasKeycard = true;
                                await typeText("You pocket the RED KEYCARD.");
                            } else {
                                await typeText("You already took the card. There is nothing else here.");
                            }
                        } else {
                            await typeText("Invalid command. Try 'west' or 'take card'.");
                        }
                    }
                }
            }
        });

        document.addEventListener('click', () => {
            if (inputContainer.style.display !== 'none') {
                inputField.focus();
            }
        });
    </script>
</body>
</html>
